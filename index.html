<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tạo Link Token</title>

  <style>
    body{
      background:#111;
      color:white;
      font-family:Arial;
      padding:40px;
    }

    button{
      padding:12px 20px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-size:16px;
    }

    #result{
      margin-top:20px;
      word-break:break-all;
      background:#222;
      padding:15px;
      border-radius:10px;
    }
  </style>
</head>
<body>

<h2>Tạo Link Giả Mã Token</h2>

<button onclick="createLink()">Tạo Link</button>

<div id="result"></div>

<script>
function randomToken(length){
  const chars =
    "abcdef0123456789";

  let token = "";

  for(let i=0;i<length;i++){
    token += chars.charAt(
      Math.floor(Math.random()*chars.length)
    );
  }

  return token;
}

function createLink(){

  const token = randomToken(120);

  const link =
    "https://yourdomain.com/r?p=" + token;

  document.getElementById("result")
    .innerHTML = link;
}
</script>

</body>
</html>
