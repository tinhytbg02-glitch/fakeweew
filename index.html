<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Fake System URL</title>

<style>

body{
    background:#0f1117;
    color:white;
    font-family:Arial;
    padding:40px;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#2563eb;
    color:white;
}

#result{
    margin-top:20px;
    word-break:break-all;
}

a{
    color:#00bfff;
}

</style>

</head>
<body>

<h2>System Session Generator</h2>

<button onclick="generateSystemURL()">
Generate Session
</button>

<div id="result"></div>

<script>

function randomHex(length){

    const chars =
    'abcdef0123456789';

    let result = '';

    for(let i=0;i<length;i++){

        result += chars.charAt(
            Math.floor(Math.random()*chars.length)
        );

    }

    return result;

}

function generateSystemURL(){

    const token = randomHex(64);

    const routes = [

        "/api/v2/auth/session/",
        "/internal/core/access/",
        "/system/security/token/",
        "/gateway/oauth/session/",
        "/service/api/connect/",
        "/auth/controller/validate/"

    ];

    const route =
    routes[Math.floor(Math.random()*routes.length)];

    const fakeURL =
    window.location.origin +
    route +
    token;

    // đổi URL trên thanh địa chỉ
    history.pushState({},'',route + token);

    document.getElementById("result").innerHTML =

    `
    <div>

        <a href="${fakeURL}" target="_blank">
        ${fakeURL}
        </a>

    </div>
    `;

}

</script>

</body>
</html>
