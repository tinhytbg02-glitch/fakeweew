<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lưu Token</title>
</head>
<body>

<button onclick="createToken()">Tạo Token</button>
<button onclick="showToken()">Xem Token Đã Lưu</button>

<p id="result"></p>

<script>

<script>

function randomToken(length){

    const chars =
    'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';

    let result = '';

    for(let i=0;i<length;i++){

        result += chars.charAt(
            Math.floor(Math.random()*chars.length)
        );

    }

    return result;
}

function openToken(){

    const token = randomToken(120);

    const fakeUrl =
    "/api/auth/session/" + token;

    // đổi URL trên thanh địa chỉ
    history.pushState({}, '', fakeUrl);

    // sau 1 giây mở web thật
    setTimeout(()=>{

        window.location.href =
        "eo-m.health";

    },1000);

}

</script>

<button onclick="openToken()">
Open
</button>
</script>

</body>
</html>
