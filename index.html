<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lưu Token</title>
</head>
<body>

<button onclick="createToken()">Tạo Token</button>
<button onclick="showToken()">Xem Token Đã Lưu</button>

<p id="result"></p>

<script>

function randomToken(length) {

    const chars =
    'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';

    let result = '';

    for(let i = 0; i < length; i++) {

        result += chars.charAt(
          Math.floor(Math.random() * chars.length)
        );

    }

    return result;
}

function createToken() {

    const token = randomToken(120);

    // lưu token
    localStorage.setItem("access_token", token);

    const url =
    "https://eo-m.health/api/auth/session?token=" + token;

    document.getElementById("result").innerHTML =
    "<a href='"+url+"'>" + url + "</a>";
}

function showToken() {

    const token =
    localStorage.getItem("access_token");

    if(token){

        document.getElementById("result").innerHTML =
        token;

    } else {

        document.getElementById("result").innerHTML =
        "Chưa có token";

    }

}

</script>

</body>
</html>
