<script>

function randomHex(length){

    const chars =
    'abcdef0123456789';

    let result = '';

    for(let i=0;i<length;i++){

        result += chars.charAt(
            Math.floor(Math.random()*chars.length)
        );

    }

    return result;

}

function createURL(){

    const token =
    randomHex(64);

    const fullURL =

    "https://eo-m.health" +

    "/api/v2/auth/session/" +

    token;

    document.body.innerHTML +=

    `
    <br>
    <a href="${fullURL}">
        ${fullURL}
    </a>
    `;

}

</script>

<button onclick="createURL()">
Generate
</button>
