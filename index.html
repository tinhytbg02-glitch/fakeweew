<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Protected Link</title>
</head>
<body>

<button onclick="openProtected()">
  Mở Link
</button>

<script>

function randomToken(length){
  const chars =
    "abcdef0123456789";

  let out = "";

  for(let i=0;i<length;i++){
    out += chars[
      Math.floor(Math.random()*chars.length)
    ];
  }

  return out;
}

function openProtected(){

  const token = randomToken(120);

  // lưu session hợp lệ
  sessionStorage.setItem(
    "valid_access",
    token
  );

  // mở trang
  window.location.href =
    "page.html?token=" + token;
}

</script>

</body>
</html>
